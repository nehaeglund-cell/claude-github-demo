name: Nightly Dependency Audit

# Scans all Maven dependencies for known CVEs using OWASP Dependency-Check,
# then uses Claude to triage findings and create GitHub issues for HIGH/CRITICAL vulnerabilities.

on:
  workflow_dispatch:   # triggered manually or by nightly-orchestrator.yml
  workflow_call:       # called directly by nightly-orchestrator.yml

jobs:
  audit:
    name: OWASP Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency-Check
        # -DfailBuildOnCVSS=11 means never fail the build (CVSS max is 10).
        # We want the report regardless — Claude decides what to escalate.
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=11 \
            -Dformat=JSON \
            -DprettyPrint=true \
            --no-transfer-progress
        continue-on-error: true

      - name: Upload full report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ github.run_number }}
          path: target/dependency-check-report.json
          retention-days: 30

      - name: Triage findings with Claude and create issues
        if: always()
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(cat:*),Bash(jq:*),Bash(gh issue create:*),Bash(gh issue list:*)
          prompt: |
            You are a dependency security analyst for ${{ github.repository }}.

            Read the OWASP Dependency-Check report at:
              target/dependency-check-report.json

            The JSON structure is:
              .dependencies[].vulnerabilities[]
              Each vulnerability has: .name (CVE), .severity, .cvssv3.baseScore, .description

            Steps:
            1. Parse the report and extract all CRITICAL (CVSS >= 9.0) and HIGH (CVSS >= 7.0) findings.
            2. For each finding, check whether a GitHub issue already exists for that CVE to avoid duplicates:
               gh issue list --repo ${{ github.repository }} --search "<CVE-ID>" --json number --jq length
            3. Create a GitHub issue for each unique HIGH/CRITICAL CVE not already reported, using:
               - Title: "[Dependency] <CVE-ID> — <affected library> (<severity>)"
               - Labels: dependency-vulnerability, <critical or high>
               - Body: CVE, affected dependency + version, CVSS score, description, remediation advice
            4. Post a step summary to $GITHUB_STEP_SUMMARY:
               - Total dependencies scanned
               - Count by severity: CRITICAL / HIGH / MEDIUM / LOW
               - List of CVEs escalated to issues
               - List of CVEs suppressed (MEDIUM/LOW)
          show_full_output: true