name: Nightly AI Orchestrator

# Single entry point for all nightly AI jobs.
# Sub-workflows are called via workflow_call (reusable workflows) — this is the
# only way to trigger other workflows from GITHUB_TOKEN without a PAT, since
# GitHub blocks workflow_dispatch cross-triggers to prevent recursive loops.
#
# To add a new nightly job in future:
#   1. Create the workflow file with "on: workflow_call" in its triggers
#   2. Add a job below that calls it with "uses: ./.github/workflows/<name>.yml"
#   3. Add it to the "needs:" list of the morning-briefing job
#   4. Mention it in the Claude prompt

on:
  # Nightly schedule disabled — manual runs only via workflow_dispatch.
  # schedule:
  #   - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:
    inputs:
      run_pentest:
        description: '1. Payment API Pentest'
        type: boolean
        default: true
      run_pr_review:
        description: '2. PR Review'
        type: boolean
        default: true
      run_security_updates:
        description: '3. Security Updates Check'
        type: boolean
        default: true

# Top-level permissions are the ceiling for all called workflows.
# Each sub-workflow's job-level permissions are further restricted within these.
permissions:
  contents: read
  issues: write          # pentest + dependency audit create findings issues
  pull-requests: write   # pr-review posts review comments
  actions: read          # pr-review reads CI results on PRs
  id-token: write        # claude-code-action OIDC token (pr-review, dependency-audit)

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Nightly jobs — run in parallel; each can be toggled off via workflow_dispatch
  # inputs. When triggered by schedule all three run unconditionally.
  # ─────────────────────────────────────────────────────────────────────────────

  pentest:
    name: Payment API Pentest
    # Run when: scheduled (inputs empty) OR manually with run_pentest = true
    if: ${{ github.event_name == 'schedule' || inputs.run_pentest == true }}
    uses: ./.github/workflows/nightly-pentest.yml
    secrets: inherit

  pr-review:
    name: PR Review
    if: ${{ github.event_name == 'schedule' || inputs.run_pr_review == true }}
    uses: ./.github/workflows/nightly-pr-review.yml
    secrets: inherit

  security-updates:
    name: Security Updates Check
    if: ${{ github.event_name == 'schedule' || inputs.run_security_updates == true }}
    uses: ./.github/workflows/nightly-security-updates.yml
    secrets: inherit

  # ─────────────────────────────────────────────────────────────────────────────
  # Morning briefing — Claude reads all results and creates a summary issue
  # ─────────────────────────────────────────────────────────────────────────────

  morning-briefing:
    name: Morning Briefing
    needs: [pentest, pr-review, security-updates]
    if: always()   # run even if some nightly jobs failed or were skipped
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write consolidated job summary
        if: always()
        run: |
          result_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⏹️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          PENTEST_ICON=$(result_icon "${{ needs.pentest.result }}")
          PR_ICON=$(result_icon "${{ needs.pr-review.result }}")
          UPDATES_ICON=$(result_icon "${{ needs.security-updates.result }}")

          {
            echo "## 🌙 Nightly AI Orchestrator — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Payment API Pentest    | $PENTEST_ICON \`${{ needs.pentest.result }}\` |"
            echo "| PR Review              | $PR_ICON \`${{ needs.pr-review.result }}\` |"
            echo "| Security Updates Check | $UPDATES_ICON \`${{ needs.security-updates.result }}\` |"
            echo ""
            echo "_Morning briefing issue created below by Claude._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create morning briefing with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh run view:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(date:*)
          prompt: |
            You are the morning briefing agent for ${{ github.repository }}.
            Today's date: $(date -u +%Y-%m-%d).

            The three nightly jobs have just completed with these results:
            - Pentest:           ${{ needs.pentest.result }}
            - PR Review:         ${{ needs.pr-review.result }}
            - Security Updates:  ${{ needs.security-updates.result }}

            (A result of "skipped" means the job was disabled for this run via workflow_dispatch inputs.)

            Steps:
            1. Check if a morning briefing issue for today already exists to avoid duplicates:
               gh issue list --repo ${{ github.repository }} --search "Nightly AI Report $(date -u +%Y-%m-%d)" --json number --jq length
               If count > 0, skip issue creation.

            2. Read the recent GitHub issues to find any new findings created overnight
               (pentest vulnerabilities, CVEs, PR review BLOCKING items):
               gh issue list --repo ${{ github.repository }} --state open --limit 20 --json number,title,labels,createdAt

            3. For the PR Review section, fetch the review comments left on each open PR overnight:
               a. List all open PRs:
                  gh pr list --repo ${{ github.repository }} --state open --json number,title,author
               b. For each PR, fetch the reviews posted:
                  gh pr view <number> --repo ${{ github.repository }} --json reviews,number,title
               Summarise per PR: PR title, verdict (APPROVED / CHANGES_REQUESTED / COMMENTED),
               and the key findings (BLOCKING / ADVISORY / NIT) from the review body.

            4. Create a morning briefing issue titled:
               "🌙 Nightly AI Report — $(date -u +%Y-%m-%d)"
               Labels: nightly-report
               Body (bullet points, concise):
               - **Pentest**: ${{ needs.pentest.result }} — note any new vulnerability issues opened
               - **PR Review**: ${{ needs.pr-review.result }} — for each reviewed PR list the verdict and key findings
               - **Security Updates**: ${{ needs.security-updates.result }} — note any flagged dependency upgrades
               - **Recommended actions**: what @neha-eglund should look at today
          show_full_output: true