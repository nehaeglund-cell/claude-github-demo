name: Nightly AI Orchestrator

# Single entry point for all nightly AI jobs.
# Sub-workflows are called via workflow_call (reusable workflows) — this is the
# only way to trigger other workflows from GITHUB_TOKEN without a PAT, since
# GitHub blocks workflow_dispatch cross-triggers to prevent recursive loops.
#
# To add a new nightly job in future:
#   1. Create the workflow file with "on: workflow_call" in its triggers
#   2. Add a job below that calls it with "uses: ./.github/workflows/<name>.yml"
#   3. Add it to the "needs:" list of the morning-briefing job
#   4. Mention it in the Claude prompt

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Nightly jobs — run in parallel
  # ─────────────────────────────────────────────────────────────────────────────

  pentest:
    name: Payment API Pentest
    uses: ./.github/workflows/nightly-pentest.yml
    secrets: inherit

  pr-review:
    name: PR Review
    uses: ./.github/workflows/nightly-pr-review.yml
    secrets: inherit

  dependency-audit:
    name: Dependency Audit
    uses: ./.github/workflows/nightly-dependency-audit.yml
    secrets: inherit

  # ─────────────────────────────────────────────────────────────────────────────
  # Morning briefing — Claude reads all results and creates a summary issue
  # ─────────────────────────────────────────────────────────────────────────────

  morning-briefing:
    name: Morning Briefing
    needs: [pentest, pr-review, dependency-audit]
    if: always()   # run even if one of the nightly jobs failed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create morning briefing with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh run view:*),Bash(date:*)
          prompt: |
            You are the morning briefing agent for ${{ github.repository }}.
            Today's date: $(date -u +%Y-%m-%d).

            The three nightly jobs have just completed with these results:
            - Pentest:           ${{ needs.pentest.result }}
            - PR Review:         ${{ needs.pr-review.result }}
            - Dependency Audit:  ${{ needs.dependency-audit.result }}

            Steps:
            1. Check if a morning briefing issue for today already exists to avoid duplicates:
               gh issue list --repo ${{ github.repository }} --search "Nightly AI Report $(date -u +%Y-%m-%d)" --json number --jq length
               If count > 0, skip issue creation.

            2. Read the recent GitHub issues to find any new findings created overnight
               (pentest vulnerabilities, CVEs, PR review BLOCKING items):
               gh issue list --repo ${{ github.repository }} --state open --limit 20 --json number,title,labels,createdAt

            3. Create a morning briefing issue titled:
               "🌙 Nightly AI Report — $(date -u +%Y-%m-%d)"
               Labels: nightly-report
               Body (bullet points, concise):
               - **Pentest**: ${{ needs.pentest.result }} — note any new vulnerability issues opened
               - **PR Review**: ${{ needs.pr-review.result }} — note any BLOCKING findings
               - **Dependency Audit**: ${{ needs.dependency-audit.result }} — note any new CVE issues
               - **Recommended actions**: what @neha-eglund should look at today
          show_full_output: true