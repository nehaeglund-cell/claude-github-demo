name: Nightly PR Review

on:
  workflow_dispatch:      # triggered manually or by nightly-orchestrator.yml
  workflow_call:          # called directly by nightly-orchestrator.yml

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: list open, non-draft PRs and pass the numbers to the matrix job.
  # ─────────────────────────────────────────────────────────────────────────────
  list-open-prs:
    name: List open pull requests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr_numbers: ${{ steps.list.outputs.pr_numbers }}

    steps:
      - name: Fetch open non-draft PR numbers
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBERS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,isDraft \
            --jq '[.[] | select(.isDraft == false) | .number]')
          echo "pr_numbers=$PR_NUMBERS" >> "$GITHUB_OUTPUT"
          echo "PRs to review: $PR_NUMBERS"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: review each PR in parallel (capped at 3 concurrent to respect rate limits).
  # ─────────────────────────────────────────────────────────────────────────────
  review-pr:
    name: Review PR #${{ matrix.pr_number }}
    needs: list-open-prs
    if: needs.list-open-prs.outputs.pr_numbers != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.pr_numbers) }}
      fail-fast: false   # review all PRs even if one review job fails
      max-parallel: 3    # avoid hammering the Anthropic API

    permissions:
      contents: read
      pull-requests: write  # post the review comment
      issues: read
      id-token: write
      actions: read         # allow Claude to read CI results on the PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ matrix.pr_number }}

            This is a security-focused pentest suite (see CLAUDE.md for full context).
            When reviewing, apply the rules from the "Code Review Rules" section in CLAUDE.md,
            which includes severity labels ([BLOCKING] / [ADVISORY] / [NIT]) and covers:

            1. Security — IDOR ownership checks, session validation, hardcoded secrets, CORS
            2. Test quality — realistic probe params, intentional-failure documentation,
               no bare assumeTrue(false)
            3. CI / workflow — PENTEST_CREATE_ISSUES opt-in, separate Stripe/Payment API steps,
               -Dgroups not -DexcludedGroups only, test classes ending in *Test
            4. Code style — records, switch expressions, no checked exceptions in @TestFactory lambdas,
               use var instead of explicit types, List.of()/Map.of() for immutable collections,
               no System.out.println (use SLF4J), streams over imperative loops, no magic numbers

            Known intentional failures (do NOT flag as bugs):
            - Stripe SSRF tests fail in CI by design — they surface the finding
            - IDOR / session tests fail against staging — the API has those vulnerabilities

            End your review with a one-line verdict: APPROVE, REQUEST_CHANGES, or COMMENT.
          show_full_output: true
