name: Nightly PR Review

on:
  workflow_dispatch:      # triggered manually or by nightly-orchestrator.yml
  workflow_call:          # called directly by nightly-orchestrator.yml

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: list open, non-draft PRs and pass the numbers to the matrix job.
  # ─────────────────────────────────────────────────────────────────────────────
  list-open-prs:
    name: List open pull requests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr_numbers: ${{ steps.list.outputs.pr_numbers }}

    steps:
      - name: Fetch open non-draft PR numbers
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBERS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,isDraft \
            --jq '[.[] | select(.isDraft == false) | .number]')
          echo "pr_numbers=$PR_NUMBERS" >> "$GITHUB_OUTPUT"
          echo "PRs to review: $PR_NUMBERS"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: review each PR in parallel (capped at 3 concurrent to respect rate limits).
  # ─────────────────────────────────────────────────────────────────────────────
  review-pr:
    name: Review PR #${{ matrix.pr_number }}
    needs: list-open-prs
    if: needs.list-open-prs.outputs.pr_numbers != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.pr_numbers) }}
      fail-fast: false   # review all PRs even if one review job fails
      max-parallel: 3    # avoid hammering the Anthropic API

    permissions:
      contents: read
      pull-requests: write  # post the review comment
      issues: read
      id-token: write
      actions: read         # allow Claude to read CI results on the PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh issue create:*),Bash(gh issue list:*),Read
          prompt: |
            Review PR #${{ matrix.pr_number }} in repository ${{ github.repository }}.

            Steps:
            1. Read the PR metadata:
               gh pr view ${{ matrix.pr_number }} --repo ${{ github.repository }} --json title,body,author,files,labels
            2. Read the full diff:
               gh pr diff ${{ matrix.pr_number }} --repo ${{ github.repository }}
            3. Read CLAUDE.md for the "Code Review Rules" section — it defines severity labels
               ([BLOCKING] / [ADVISORY] / [NIT]) and rules across four areas:
               - Security: IDOR ownership checks, session validation, hardcoded secrets, CORS
               - Test quality: realistic probe params, intentional-failure docs, no bare assumeTrue(false)
               - CI / workflow: PENTEST_CREATE_ISSUES opt-in, separate Stripe/Payment API steps,
                 -Dgroups not -DexcludedGroups only, test classes ending in *Test
               - Code style: records, switch expressions, no checked exceptions in @TestFactory lambdas,
                 var for local variables, List.of()/Map.of() for immutable collections,
                 no System.out.println (use SLF4J), streams over imperative loops, no magic numbers

            Known intentional failures — do NOT flag these as bugs:
            - Stripe SSRF tests fail in CI by design — they surface the finding
            - IDOR / session tests fail against staging — the API has those vulnerabilities

            4. Write a review body with:
               - A brief summary of the change
               - All findings grouped by [BLOCKING] / [ADVISORY] / [NIT], each with the file and line
               - A final one-line verdict

            5. Post the review to the PR:
               - Any [BLOCKING] finding:
                 gh pr review ${{ matrix.pr_number }} --repo ${{ github.repository }} --request-changes --body "<review body>"
               - Only [ADVISORY] or [NIT] findings:
                 gh pr review ${{ matrix.pr_number }} --repo ${{ github.repository }} --comment --body "<review body>"
               - No findings at all:
                 gh pr review ${{ matrix.pr_number }} --repo ${{ github.repository }} --approve --body "LGTM — no issues found."
          show_full_output: true