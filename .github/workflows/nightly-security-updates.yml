name: Nightly Security Updates Check

# Checks all Maven dependencies for available updates, then uses Claude to identify
# security-relevant upgrades and create GitHub issues for any that need attention.

on:
  workflow_dispatch:   # triggered manually or by nightly-orchestrator.yml
  workflow_call:       # called directly by nightly-orchestrator.yml

jobs:
  security-updates:
    name: Dependency Security Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Check for dependency updates
        run: |
          mkdir -p target
          mvn versions:display-dependency-updates \
            --no-transfer-progress \
            2>&1 | tee target/security-updates-report.txt

      - name: Upload updates report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-updates-report-${{ github.run_number }}
          path: target/security-updates-report.txt
          retention-days: 30

      - name: Triage updates with Claude and create issues
        if: always()
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowed-tools
            Bash(cat:*),Bash(grep:*),Bash(gh issue create:*),Bash(gh issue list:*)
          prompt: |
            You are a dependency security analyst for ${{ github.repository }}.

            Read the Maven versions report at:
              target/security-updates-report.txt

            The report lists dependencies with available updates in the format:
              [INFO] <groupId>:<artifactId> ... <currentVersion> -> <latestVersion>

            Steps:
            1. Parse the report and extract all dependencies that have updates available.
            2. Flag any dependency where the update is likely security-related — look for:
               - Major or minor version jumps (e.g. 1.x -> 2.x, or 3.1 -> 3.5)
               - Known security-sensitive libraries (e.g. jackson-databind, log4j, spring-*, netty, okhttp, snakeyaml, commons-*)
               - Dependencies with patch releases that commonly carry CVE fixes
            3. For each flagged dependency not already tracked in a GitHub issue, create one:
               - Title: "[Security Update] <artifactId> <currentVersion> → <latestVersion>"
               - Labels: security-update, dependencies
               - Body: current vs latest version, why this update is security-relevant, recommended action
            4. Post a step summary to $GITHUB_STEP_SUMMARY:
               - Total dependencies/plugins with updates available
               - Count flagged as security-relevant
               - List of issues created
               - List of updates considered low-risk (skipped)
          show_full_output: true